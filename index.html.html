<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>15 Crèmes Fondamentales — MOF Moderne</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F5F0E8;
    --dark: #1A1410;
    --brown: #3D2B1F;
    --gold: #C9A84C;
    --gold-light: #E8D5A0;
    --rust: #8B4513;
    --smoke: #E8E2D9;
    --text: #2C2018;
    --muted: #8A7B6E;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    color: var(--text);
    font-family: 'Cormorant Garamond', Georgia, serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    background: var(--dark);
    padding: 3rem 2rem 2.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 40px,
      rgba(201,168,76,0.04) 40px,
      rgba(201,168,76,0.04) 80px
    );
  }
  .header-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 1rem;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.8rem);
    color: var(--cream);
    font-weight: 700;
    line-height: 1.1;
  }
  header h1 em {
    color: var(--gold);
    font-style: italic;
    font-weight: 400;
  }
  .header-sub {
    font-size: 1.1rem;
    color: var(--gold-light);
    margin-top: 0.8rem;
    font-style: italic;
    font-weight: 300;
  }
  .header-line {
    width: 60px;
    height: 1px;
    background: var(--gold);
    margin: 1.5rem auto 0;
  }

  /* ── GRID INDEX ── */
  .index-section {
    padding: 3rem 2rem;
    max-width: 1200px;
    margin: 0 auto;
  }
  .section-title {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }
  .recipe-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1px;
    background: rgba(61,43,31,0.15);
    border: 1px solid rgba(61,43,31,0.15);
  }
  .recipe-card {
    background: var(--cream);
    padding: 1.5rem;
    cursor: pointer;
    transition: background 0.2s, transform 0.2s;
    position: relative;
    overflow: hidden;
  }
  .recipe-card:hover {
    background: var(--dark);
  }
  .recipe-card:hover .card-num,
  .recipe-card:hover .card-title,
  .recipe-card:hover .card-tag,
  .recipe-card:hover .card-desc { color: var(--cream); }
  .recipe-card:hover .card-tag { background: var(--gold); color: var(--dark); }
  .recipe-card:hover .card-arrow { opacity: 1; color: var(--gold); }

  .card-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--gold);
    letter-spacing: 0.1em;
    margin-bottom: 0.5rem;
  }
  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    font-weight: 700;
    line-height: 1.3;
    color: var(--dark);
    margin-bottom: 0.5rem;
  }
  .card-desc {
    font-size: 0.85rem;
    color: var(--muted);
    line-height: 1.5;
    font-style: italic;
    margin-bottom: 0.8rem;
  }
  .card-tag {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    background: var(--smoke);
    color: var(--muted);
    padding: 0.2rem 0.5rem;
    border-radius: 2px;
  }
  .card-arrow {
    position: absolute;
    bottom: 1.2rem;
    right: 1.2rem;
    font-size: 1.1rem;
    opacity: 0;
    transition: opacity 0.2s;
  }

  /* ── RECIPE DETAIL ── */
  #detail-view {
    display: none;
    min-height: 100vh;
  }
  .detail-header {
    background: var(--dark);
    padding: 2rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }
  .back-btn {
    background: none;
    border: 1px solid rgba(255,255,255,0.2);
    color: var(--cream);
    padding: 0.5rem 1rem;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .back-btn:hover { background: var(--gold); border-color: var(--gold); color: var(--dark); }

  .detail-header-info { flex: 1; }
  .detail-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--gold);
    letter-spacing: 0.3em;
    margin-bottom: 0.4rem;
  }
  .detail-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.4rem, 3vw, 2.2rem);
    color: var(--cream);
    font-weight: 700;
    line-height: 1.2;
  }
  .detail-desc {
    font-style: italic;
    color: var(--gold-light);
    margin-top: 0.4rem;
    font-size: 0.95rem;
  }

  .detail-body {
    max-width: 900px;
    margin: 0 auto;
    padding: 3rem 2rem;
    display: grid;
    grid-template-columns: 1fr 1.4fr;
    gap: 3rem;
  }
  @media(max-width:700px) {
    .detail-body { grid-template-columns: 1fr; gap: 2rem; }
  }

  /* Ingredients */
  .ingredients-panel h3 {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1.2rem;
  }
  .servings-control {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    margin-bottom: 1.5rem;
    padding: 0.8rem;
    background: var(--smoke);
    border-radius: 4px;
  }
  .servings-control label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    flex: 1;
  }
  .servings-btn {
    background: var(--dark);
    color: var(--cream);
    border: none;
    width: 28px; height: 28px;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
    border-radius: 2px;
  }
  .servings-btn:hover { background: var(--gold); color: var(--dark); }
  #servings-val {
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    font-weight: 500;
    min-width: 30px;
    text-align: center;
  }

  .ingredient-list { list-style: none; }
  .ingredient-item {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 0.6rem 0;
    border-bottom: 1px solid rgba(61,43,31,0.1);
    gap: 1rem;
  }
  .ingredient-item:last-child { border-bottom: none; }
  .ing-name {
    font-size: 0.95rem;
    color: var(--text);
    flex: 1;
    line-height: 1.4;
  }
  .ing-amount {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--gold);
    font-weight: 500;
    white-space: nowrap;
    background: rgba(201,168,76,0.1);
    padding: 0.15rem 0.4rem;
    border-radius: 2px;
  }

  /* Notes */
  .notes-box {
    margin-top: 1.5rem;
    background: var(--dark);
    padding: 1.2rem;
    border-radius: 4px;
  }
  .notes-box h4 {
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.8rem;
  }
  .notes-box p {
    font-size: 0.82rem;
    color: var(--gold-light);
    line-height: 1.6;
    font-style: italic;
  }

  /* Steps */
  .steps-panel h3 {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1.2rem;
  }
  .step-item {
    border: 1px solid rgba(61,43,31,0.12);
    border-radius: 6px;
    margin-bottom: 1rem;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .step-item.active { border-color: var(--gold); }
  .step-item.done { border-color: rgba(61,43,31,0.08); background: rgba(61,43,31,0.02); }
  .step-item.done .step-num { background: #4CAF50; color: white; }

  .step-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.9rem 1rem;
    cursor: pointer;
    background: white;
    transition: background 0.15s;
  }
  .step-item.active .step-header { background: rgba(201,168,76,0.08); }
  .step-item.done .step-header { background: rgba(61,43,31,0.03); }

  .step-num {
    width: 28px; height: 28px;
    background: var(--dark);
    color: var(--cream);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    font-weight: 500;
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .step-title-text {
    flex: 1;
    font-weight: 600;
    font-size: 0.95rem;
    color: var(--dark);
  }
  .step-item.done .step-title-text { text-decoration: line-through; color: var(--muted); }
  .timer-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    background: rgba(201,168,76,0.15);
    color: var(--rust);
    padding: 0.15rem 0.4rem;
    border-radius: 2px;
    white-space: nowrap;
  }

  .step-body {
    padding: 0.9rem 1rem 1rem 3.5rem;
    background: white;
    border-top: 1px solid rgba(61,43,31,0.06);
    display: none;
  }
  .step-item.active .step-body { display: block; }
  .step-body p {
    font-size: 0.9rem;
    line-height: 1.65;
    color: var(--text);
    margin-bottom: 1rem;
  }

  /* Timer */
  .timer-section {
    background: var(--dark);
    border-radius: 6px;
    padding: 1rem;
    text-align: center;
  }
  .timer-display {
    font-family: 'DM Mono', monospace;
    font-size: 2.2rem;
    color: var(--gold);
    letter-spacing: 0.05em;
    margin: 0.3rem 0;
  }
  .timer-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.8rem;
  }
  .timer-controls {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  .timer-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.4rem 0.9rem;
    border: 1px solid rgba(255,255,255,0.2);
    background: none;
    color: var(--cream);
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }
  .timer-btn:hover, .timer-btn.primary { background: var(--gold); border-color: var(--gold); color: var(--dark); }
  .timer-btn.danger { border-color: rgba(200,80,80,0.4); }
  .timer-btn.danger:hover { background: #c85050; border-color: #c85050; }
  .timer-progress {
    height: 3px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    margin-top: 0.8rem;
    overflow: hidden;
  }
  .timer-progress-bar {
    height: 100%;
    background: var(--gold);
    width: 0%;
    transition: width 1s linear;
    border-radius: 2px;
  }

  .step-done-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.5rem 1.2rem;
    background: var(--dark);
    color: var(--cream);
    border: none;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    display: block;
    margin-top: 0.8rem;
  }
  .step-done-btn:hover { background: #4CAF50; }

  /* Nav between recipes */
  .recipe-nav {
    max-width: 900px;
    margin: 0 auto 3rem;
    padding: 0 2rem;
    display: flex;
    justify-content: space-between;
    gap: 1rem;
  }
  .recipe-nav-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.6rem 1.2rem;
    background: var(--dark);
    color: var(--cream);
    border: none;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.2s;
  }
  .recipe-nav-btn:hover { background: var(--gold); color: var(--dark); }
  .recipe-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--dark);
    color: var(--gold);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    padding: 0.8rem 1.5rem;
    border-radius: 4px;
    border: 1px solid var(--gold);
    z-index: 1000;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* Footer */
  footer {
    background: var(--dark);
    text-align: center;
    padding: 2rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
  }
  footer span { color: var(--gold); }

  @media(max-width:600px) {
    .detail-body { padding: 1.5rem 1rem; }
    .recipe-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- ══════════════ INDEX VIEW ══════════════ -->
<div id="index-view">
  <header>
    <div class="header-label">Pâtisserie de Haute Précision</div>
    <h1>15 Crèmes <em>Fondamentales</em></h1>
    <div class="header-sub">Version MOF Moderne — Process & Températures</div>
    <div class="header-line"></div>
  </header>

  <section class="index-section">
    <div class="section-title">Sélectionner une recette</div>
    <div class="recipe-grid" id="recipe-grid"></div>
  </section>
</div>

<!-- ══════════════ DETAIL VIEW ══════════════ -->
<div id="detail-view">
  <div class="detail-header">
    <button class="back-btn" onclick="showIndex()">← Retour</button>
    <div class="detail-header-info">
      <div class="detail-num" id="d-num"></div>
      <div class="detail-title" id="d-title"></div>
      <div class="detail-desc" id="d-desc"></div>
    </div>
  </div>

  <div class="detail-body">
    <div class="ingredients-panel">
      <h3>Ingrédients</h3>
      <div class="servings-control">
        <label>Portions ×</label>
        <button class="servings-btn" onclick="changeServings(-1)">−</button>
        <span id="servings-val">1</span>
        <button class="servings-btn" onclick="changeServings(1)">+</button>
      </div>
      <ul class="ingredient-list" id="ing-list"></ul>
      <div class="notes-box" id="notes-box" style="display:none">
        <h4>Notes MOF</h4>
        <p id="notes-text"></p>
      </div>
    </div>

    <div class="steps-panel">
      <h3>Étapes</h3>
      <div id="steps-list"></div>
    </div>
  </div>

  <div class="recipe-nav">
    <button class="recipe-nav-btn" id="prev-btn" onclick="navigateRecipe(-1)">← Recette précédente</button>
    <button class="recipe-nav-btn" id="next-btn" onclick="navigateRecipe(1)">Recette suivante →</button>
  </div>
</div>

<div id="toast">✓ Étape marquée comme terminée</div>

<footer>
  <span>15 Crèmes MOF Modernes</span> — Fiches Techniques Haute Pâtisserie
</footer>

<script>
const RECIPES = [
  {
    num: "01",
    title: "Crémeux Vanille",
    shortTitle: "Crémeux Vanille",
    tag: "Base universelle",
    desc: "Remplace la pâtissière classique. Texture crème brûlée coulante, brillance naturelle.",
    fullDesc: "Texture de crème brûlée coulante, pas d'amidon visible, pas d'effet colle. Brillance naturelle.",
    ingredients: [
      { name: "Lait entier", amount: 200, unit: "g" },
      { name: "Crème 35%", amount: 150, unit: "g" },
      { name: "Gousses de vanille Tahiti (infusion 24h à froid)", amount: 2, unit: "" },
      { name: "Jaunes d'œufs", amount: 80, unit: "g" },
      { name: "Sucre", amount: 60, unit: "g" },
      { name: "Fécule de maïs", amount: 12, unit: "g" },
      { name: "Gélatine 200 bloom (essorée)", amount: 3, unit: "g" },
    ],
    steps: [
      { title: "Infusion à froid", text: "Fendre et gratter les gousses de vanille dans lait + crème. Filmer et infuser 24h au réfrigérateur. L'infusion froide extrait 3× plus d'arôme qu'à chaud.", timer: 86400 },
      { title: "Blanchir les jaunes", text: "Blanchir jaunes + sucre + fécule tamisée au fouet jusqu'à mélange homogène et légèrement mousseux.", timer: 0 },
      { title: "Cuire le crémeux", text: "Chauffer le lait vanillé filtré au chinois fin. Verser 1/3 sur le mélange jaunes, fouetter, reverser dans la casserole. Cuire à feu moyen en remuant constamment jusqu'à 84°C exactement.", timer: 300 },
      { title: "Incorporer la gélatine", text: "Hors du feu, incorporer la gélatine réhydratée 10 min dans eau froide et essorée. Mélanger jusqu'à dissolution complète.", timer: 0 },
      { title: "Émulsionner au mixeur", text: "Mixer 3 min au mixeur plongeant SANS lever la tête pour ne pas incorporer d'air. C'est cette étape qui crée la texture soyeuse et la brillance.", timer: 180 },
      { title: "Couler et cristalliser", text: "Couler immédiatement dans les moules. Filmer au contact sans laisser d'air. Laisser cristalliser au réfrigérateur minimum 6h.", timer: 21600 },
    ],
    notes: "VERSION MONTÉE : Ajouter 300g crème 35% froide après émulsion → laisser 12h au froid → monter au fouet vitesse moyenne jusqu'à texture mousse ferme.\n\nRÈGLE D'OR : Ne jamais dépasser 84°C sinon les jaunes coagulent. Conservation : 72h filmé au contact."
  },
  {
    num: "02",
    title: "Ganache Montée Chocolat Lait",
    shortTitle: "Ganache Montée Lait",
    tag: "Poche · Entremets",
    desc: "Texture nuageuse, fond en bouche, tenue 48h. La vraie ganache montée des grands chefs.",
    fullDesc: "Remplace la ganache classique dense. Texture nuageuse, fond en bouche, se tient en poche 48h.",
    ingredients: [
      { name: "Chocolat lait Valrhona Jivara 40%", amount: 200, unit: "g" },
      { name: "Crème 35% chaude", amount: 100, unit: "g" },
      { name: "Glucose", amount: 15, unit: "g" },
      { name: "Beurre doux", amount: 20, unit: "g" },
      { name: "Crème 35% froide (lendemain)", amount: 300, unit: "g" },
    ],
    steps: [
      { title: "Fondre le chocolat", text: "Fondre le chocolat au bain-marie ou micro-ondes par tranches de 30 sec. Fondu à 45°C maximum, lisse et brillant.", timer: 0 },
      { title: "Émulsionner la ganache", text: "Chauffer crème chaude + glucose à 80°C. Verser en 3 fois sur le chocolat fondu en faisant des petits cercles énergiques au centre avec une maryse — jamais en une seule fois.", timer: 0 },
      { title: "Incorporer le beurre", text: "Quand la ganache atteint 35°C, incorporer le beurre en cubes. Mélanger jusqu'à fonte complète. Apporte brillance et onctuosité.", timer: 0 },
      { title: "Repos 12h obligatoire", text: "Ajouter la crème froide en une fois. Mélanger à la maryse. Filmer au contact. Réserver 12h minimum au réfrigérateur. Étape la plus importante — ne jamais sauter.", timer: 43200 },
      { title: "Monter la ganache", text: "Monter la ganache froide au fouet à vitesse MOYENNE jusqu'à texture mousse ferme et bec d'oiseau. Doit tripler de volume. S'arrêter dès que la texture est atteinte.", timer: 180 },
      { title: "Dresser à la poche", text: "Dresser immédiatement à la poche. Conserver les pièces dressées 48h maximum au réfrigérateur.", timer: 0 },
    ],
    notes: "RÈGLE ABSOLUE : Jamais à grande vitesse — la ganache tranche. Vitesse moyenne uniquement.\n\nSI ELLE TRANCHE : Chauffer légèrement le fond du bol 2 secondes au chalumeau → refouetter. Ça revient toujours.\n\nVARIANTES : Caramélia (caramel) / Azélia (praliné noisette)."
  },
  {
    num: "03",
    title: "Crème au Beurre Italienne",
    shortTitle: "Beurre Italienne",
    tag: "Fraisier · Opéra",
    desc: "Jamais trop sucrée, jamais qui tranche. Le dressage millimétrique des concours.",
    fullDesc: "La seule crème au beurre qui ne tranche pas, qui ne sucre pas, qui se dresse au millimètre.",
    ingredients: [

// ── STATE ──
let currentRecipe = 0;
let currentServings = 1;
let activeStep = 0;
let stepDone = [];
let timers = {};

// ── BUILD INDEX ──
function buildIndex() {
  const grid = document.getElementById('recipe-grid');
  grid.innerHTML = RECIPES.map((r, i) => `
    <div class="recipe-card" onclick="showRecipe(${i})">
      <div class="card-num">${r.num}</div>
      <div class="card-title">${r.title}</div>
      <div class="card-desc">${r.desc}</div>
      <span class="card-tag">${r.tag}</span>
      <span class="card-arrow">→</span>
    </div>
  `).join('');
}

// ── SHOW INDEX ──
function showIndex() {
  stopAllTimers();
  document.getElementById('index-view').style.display = 'block';
  document.getElementById('detail-view').style.display = 'none';
  window.scrollTo(0, 0);
}

// ── SHOW RECIPE ──
function showRecipe(idx) {
  currentRecipe = idx;
  currentServings = 1;
  activeStep = 0;
  stepDone = new Array(RECIPES[idx].steps.length).fill(false);
  timers = {};

  const r = RECIPES[idx];
  document.getElementById('d-num')?.remove;
  document.getElementById('d-num').textContent = `Recette ${r.num} / 15`;
  document.getElementById('d-title').textContent = r.title;
  document.getElementById('d-desc').textContent = r.fullDesc;

  renderIngredients();
  renderNotes();
  renderSteps();
  updateNav();

  document.getElementById('index-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'block';
  document.getElementById('servings-val').textContent = 1;
  window.scrollTo(0, 0);
}

// ── INGREDIENTS ──
function renderIngredients() {
  const r = RECIPES[currentRecipe];
  const ul = document.getElementById('ing-list');
  ul.innerHTML = r.ingredients.map(ing => {
    const qty = ing.unit ? `${Math.round(ing.amount * currentServings * 10) / 10}${ing.unit}` : `× ${Math.round(ing.amount * currentServings * 10) / 10}`;
    return `<li class="ingredient-item">
      <span class="ing-name">${ing.name}</span>
      <span class="ing-amount">${qty}</span>
    </li>`;
  }).join('');
}

function renderNotes() {
  const r = RECIPES[currentRecipe];
  const box = document.getElementById('notes-box');
  const p = document.getElementById('notes-text');
  if (r.notes) {
    p.innerHTML = r.notes.replace(/\n\n/g, '<br><br>');
    box.style.display = 'block';
  } else {
    box.style.display = 'none';
  }
}

function changeServings(delta) {
  currentServings = Math.max(1, Math.min(20, currentServings + delta));
  document.getElementById('servings-val').textContent = currentServings;
  renderIngredients();
}

// ── STEPS ──
function renderSteps() {
  const r = RECIPES[currentRecipe];
  const container = document.getElementById('steps-list');
  container.innerHTML = r.steps.map((s, i) => {
    const isDone = stepDone[i];
    const isActive = i === activeStep;
    const timerHTML = s.timer > 0 ? buildTimerHTML(i, s.timer) : '';
    return `
      <div class="step-item ${isActive ? 'active' : ''} ${isDone ? 'done' : ''}" id="step-${i}">
        <div class="step-header" onclick="toggleStep(${i})">
          <div class="step-num">${isDone ? '✓' : i + 1}</div>
          <div class="step-title-text">${s.title}</div>
          ${s.timer > 0 ? `<span class="timer-badge">⏱ ${formatTime(s.timer)}</span>` : ''}
        </div>
        <div class="step-body">
          <p>${s.text}</p>
          ${timerHTML}
          <button class="step-done-btn" onclick="markDone(${i})">${isDone ? '↩ Annuler' : '✓ Étape terminée'}</button>
        </div>
      </div>
    `;
  }).join('');
}

function buildTimerHTML(stepIdx, totalSec) {
  return `
    <div class="timer-section" id="timer-section-${stepIdx}">
      <div class="timer-label">Minuteur</div>
      <div class="timer-display" id="timer-display-${stepIdx}">${formatTime(totalSec)}</div>
      <div class="timer-controls">
        <button class="timer-btn primary" onclick="startTimer(${stepIdx}, ${totalSec})">▶ Démarrer</button>
        <button class="timer-btn" onclick="pauseTimer(${stepIdx})">⏸ Pause</button>
        <button class="timer-btn danger" onclick="resetTimer(${stepIdx}, ${totalSec})">↺ Reset</button>
      </div>
      <div class="timer-progress">
        <div class="timer-progress-bar" id="timer-bar-${stepIdx}"></div>
      </div>
    </div>
  `;
}

function toggleStep(i) {
  activeStep = i;
  renderSteps();
}

function markDone(i) {
  stepDone[i] = !stepDone[i];
  if (stepDone[i] && i < RECIPES[currentRecipe].steps.length - 1) {
    activeStep = i + 1;
  }
  renderSteps();
  if (stepDone[i]) showToast('✓ Étape ' + (i + 1) + ' terminée');
}

// ── TIMER ──
function formatTime(sec) {
  if (sec >= 3600) {
    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    return `${h}h${m.toString().padStart(2, '0')}`;
  }
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
}

function startTimer(stepIdx, totalSec) {
  if (timers[stepIdx]?.interval) clearInterval(timers[stepIdx].interval);
  const startRemaining = timers[stepIdx]?.remaining ?? totalSec;
  timers[stepIdx] = { remaining: startRemaining, total: totalSec, interval: null };
  
  timers[stepIdx].interval = setInterval(() => {
    timers[stepIdx].remaining--;
    const display = document.getElementById(`timer-display-${stepIdx}`);
    const bar = document.getElementById(`timer-bar-${stepIdx}`);
    if (display) display.textContent = formatTime(timers[stepIdx].remaining);
    if (bar) {
      const pct = ((totalSec - timers[stepIdx].remaining) / totalSec) * 100;
      bar.style.width = pct + '%';
    }
    if (timers[stepIdx].remaining <= 0) {
      clearInterval(timers[stepIdx].interval);
      if (display) display.textContent = '00:00';
      if (bar) bar.style.width = '100%';
      // Notification sonore
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        [0, 200, 400].forEach(delay => {
          setTimeout(() => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.value = 880;
            gain.gain.setValueAtTime(0.3, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
            osc.start(ctx.currentTime);
            osc.stop(ctx.currentTime + 0.3);
          }, delay);
        });
      } catch(e) {}
      showToast('⏱ Minuteur terminé — Étape ' + (stepIdx + 1));
    }
  }, 1000);
}

function pauseTimer(stepIdx) {
  if (timers[stepIdx]?.interval) {
    clearInterval(timers[stepIdx].interval);
    timers[stepIdx].interval = null;
  }
}

function resetTimer(stepIdx, totalSec) {
  pauseTimer(stepIdx);
  timers[stepIdx] = { remaining: totalSec, total: totalSec, interval: null };
  const display = document.getElementById(`timer-display-${stepIdx}`);
  const bar = document.getElementById(`timer-bar-${stepIdx}`);
  if (display) display.textContent = formatTime(totalSec);
  if (bar) bar.style.width = '0%';
}

function stopAllTimers() {
  Object.keys(timers).forEach(k => {
    if (timers[k]?.interval) clearInterval(timers[k].interval);
  });
  timers = {};
}

// ── NAVIGATION ──
function navigateRecipe(dir) {
  const next = currentRecipe + dir;
  if (next >= 0 && next < RECIPES.length) showRecipe(next);
}

function updateNav() {
  document.getElementById('prev-btn').disabled = currentRecipe === 0;
  document.getElementById('next-btn').disabled = currentRecipe === RECIPES.length - 1;
}

// ── TOAST ──
let toastTimeout;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => t.classList.remove('show'), 3000);
}

// ── INIT ──
buildIndex();
</script>
